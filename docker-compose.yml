version: "3.9"

# Local-dev compose. Production deploy is single-container (see Dockerfile + HF Spaces).
# This file makes Qdrant available as a separate process for faster local iteration.

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: refund-harness-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    container_name: refund-harness-app
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "7860:7860"
    volumes:
      - ./data:/app/data
      - ./prompts:/app/prompts
      - ./skills:/app/skills
    restart: unless-stopped

volumes:
  qdrant_storage:
